<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Велопрокат — Балтийская коса</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d6a4f;
      --green-light: #52b788;
      --sand: #f4e4c1;
      --dark: #1a1a2e;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--green) 0%, #1b4332 100%);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 3px solid var(--green-light);
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    header h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--sand);
      line-height: 1.2;
    }

    header p {
      font-size: 0.85rem;
      color: var(--green-light);
      margin-top: 2px;
    }

    .legend {
      display: flex;
      gap: 20px;
      padding: 14px 32px;
      background: #111827;
      flex-wrap: wrap;
      border-bottom: 1px solid #2d3748;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: #a0aec0;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #map {
      width: 100%;
      height: calc(100vh - 160px);
      min-height: 400px;
    }

    .loading {
      width: 100%;
      height: calc(100vh - 160px);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111827;
      gap: 16px;
      color: #a0aec0;
      font-size: 0.9rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d3748;
      border-top-color: var(--green-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">🚴</div>
  <div>
    <h1>Велопрокат — Балтийская коса</h1>
    <p>Маршруты для аренды велосипедов и самокатов</p>
  </div>
</header>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#52b788"></div>
    Пункт проката
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f6ad55"></div>
    Точка интереса
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#52b788"></div>
    Основной маршрут (~18 км)
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>Загружаем карту...</span>
</div>
<div id="map" style="display:none"></div>

<script src="https://api-maps.yandex.ru/v3/?apikey=e24c73f6-1a72-481f-9e10-6ddff382744e&lang=ru_RU"></script>
<script>
  // Маршрут по Балтийской косе (координаты: долгота, широта)
  const routePoints = [
    [19.6520, 54.9480], // Пункт проката (старт)
    [19.6540, 54.9520],
    [19.6560, 54.9570],
    [19.6590, 54.9620],
    [19.6610, 54.9670],
    [19.6640, 54.9720],
    [19.6660, 54.9780],
    [19.6690, 54.9830],
    [19.6710, 54.9880],
    [19.6730, 54.9930],
    [19.6750, 54.9980],
    [19.6770, 55.0040],
    [19.6800, 55.0090], // Финальная точка (коса)
  ];

  const pointsOfInterest = [
    { coords: [19.6520, 54.9480], name: "🟢 Пункт проката", desc: "Старт маршрута. Аренда велосипедов и самокатов.", color: "#52b788" },
    { coords: [19.6610, 54.9670], name: "🟡 Смотровая площадка", desc: "Красивый вид на залив.", color: "#f6ad55" },
    { coords: [19.6710, 54.9880], name: "🟡 Пляж", desc: "Остановка для отдыха.", color: "#f6ad55" },
    { coords: [19.6800, 55.0090], name: "🟡 Конечная точка", desc: "Конец косы. Разворотная точка маршрута.", color: "#f6ad55" },
  ];

  ymaps3.ready.then(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('map').style.display = 'block';

    const { YMap, YMapDefaultSchemeLayer, YMapDefaultFeaturesLayer,
            YMapMarker, YMapFeature } = ymaps3;

    const map = new YMap(
      document.getElementById('map'),
      {
        location: {
          center: [19.6660, 54.9780],
          zoom: 12
        }
      }
    );

    map.addChild(new YMapDefaultSchemeLayer());
    map.addChild(new YMapDefaultFeaturesLayer());

    // Линия маршрута
    map.addChild(new YMapFeature({
      geometry: {
        type: 'LineString',
        coordinates: routePoints
      },
      style: {
        stroke: [{ color: '#52b788', width: 4 }]
      }
    }));

    // Метки
    pointsOfInterest.forEach(poi => {
      const el = document.createElement('div');
      el.style.cssText = `
        background: ${poi.color};
        color: #1a1a2e;
        font-family: Inter, sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 6px 10px;
        border-radius: 20px;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        border: 2px solid white;
      `;
      el.textContent = poi.name;
      el.title = poi.desc;

      map.addChild(new YMapMarker(
        { coordinates: poi.coords },
        el
      ));
    });
  });
</script>

</body>
</html>
