<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КосаВело — Велокарта Балтийской косы</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Fira+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --accent: #39d353;
      --accent2: #f0a500;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Fira Sans', sans-serif; overflow: hidden; }

    #map { width: 100%; height: 100vh; }

    /* ── HEADER ── */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(13,17,23,0.97) 0%, rgba(13,17,23,0) 100%);
      pointer-events: none;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(57,211,83,0.4);
    }
    .brand-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .brand-sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }

    /* ── STATS ── */
    #stats {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 1000; display: flex; gap: 1px;
      background: var(--border); border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .stat {
      padding: 12px 24px;
      background: rgba(22,27,34,0.95); backdrop-filter: blur(8px);
      text-align: center;
    }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* ── SIDEBAR ── */
    #sidebar {
      position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
      z-index: 1000; width: 290px;
      background: rgba(22,27,34,0.92); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-height: calc(100vh - 120px); display: flex; flex-direction: column;
    }
    .sidebar-title {
      padding: 14px 18px 12px;
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .points-list { overflow-y: auto; flex: 1; }
    .points-list::-webkit-scrollbar { width: 3px; }
    .points-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .point-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 18px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .point-item:last-child { border-bottom: none; }
    .point-item:hover { background: rgba(57,211,83,0.07); }
    .point-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: #0d1117;
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .point-num.rental { background: var(--accent2); }
    .point-info { flex: 1; min-width: 0; }
    .point-name { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .point-type { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

    /* ── LOCATE BTN ── */
    #locateBtn {
      position: absolute; bottom: 90px; left: 20px; z-index: 1000;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(22,27,34,0.92); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    #locateBtn svg { width: 18px; height: 18px; }
    #locateBtn:hover { border-color: var(--accent); color: var(--accent); }
    #locateBtn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      background: rgba(22,27,34,0.97) !important;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      padding: 0 !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
      backdrop-filter: blur(12px);
      color: var(--text) !important;
      font-family: 'Fira Sans', sans-serif !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup-close-button {
      color: var(--muted) !important; font-size: 20px !important;
      right: 10px !important; top: 8px !important; z-index: 10;
    }
    .popup-card { width: 280px; }
    .popup-image { position: relative; height: 140px; overflow: hidden; border-radius: 14px 14px 0 0; }
    .popup-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .popup-image .image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(13,17,23,0.85) 100%);
    }
    .popup-image .image-badge {
      position: absolute; bottom: 10px; left: 12px;
      background: var(--accent2); color: #0d1117;
      font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 800;
      padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .popup-header { padding: 12px 14px 6px; }
    .popup-title { font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--text); line-height: 1.3; }
    .popup-body { padding: 0 14px 14px; }
    .description-scroll { max-height: 110px; overflow-y: auto; }
    .description-scroll::-webkit-scrollbar { width: 3px; }
    .description-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .description-scroll p { font-size: 0.78rem; color: var(--muted); line-height: 1.55; }

    /* ── NUMBERED MARKERS ── */
    .numbered-icon {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #39d353, #27ae47);
      color: #0d1117; border-radius: 50%;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      border: 2.5px solid #0d1117;
      box-shadow: 0 0 0 2px #39d353, 0 3px 10px rgba(0,0,0,0.5);
    }
    .numbered-icon.rental-marker {
      background: linear-gradient(145deg, #f0a500, #e09000) !important;
      box-shadow: 0 0 0 2px #f0a500, 0 3px 10px rgba(0,0,0,0.5) !important;
    }

    /* ── POI MARKERS (?) ── */
    .poi-icon {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #a78bfa, #7c3aed);
      color: #fff; border-radius: 50%;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      border: 2.5px solid #0d1117;
      box-shadow: 0 0 0 2px #7c3aed, 0 3px 10px rgba(0,0,0,0.5);
    }

    /* ── USER LOCATION ── */
    .user-location-marker { position: relative; }
    .pulse {
      width: 16px; height: 16px; border-radius: 50%;
      background: #4a9eff; border: 3px solid #fff;
      box-shadow: 0 0 0 4px rgba(74,158,255,0.3);
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-routing-container { display: none !important; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 10px !important; overflow: hidden; }
    .leaflet-control-zoom a {
      background: rgba(22,27,34,0.92) !important; backdrop-filter: blur(8px);
      color: var(--muted) !important; border-bottom: 1px solid var(--border) !important;
      font-size: 16px !important; line-height: 28px !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(57,211,83,0.15) !important; color: var(--accent) !important; }
    .leaflet-control-attribution { background: rgba(13,17,23,0.7) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--muted) !important; }

    @media (max-width: 600px) {
      #sidebar { display: none; }
      .stat { padding: 10px 14px; }
      .stat-val { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div id="header">
  <div class="brand">
    <div class="brand-icon">🚴</div>
    <div>
      <div class="brand-name">КосаВело</div>
      <div class="brand-sub">Балтийская коса · Прокат</div>
    </div>
  </div>
</div>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-title">Точки маршрута</div>
  <div class="points-list" id="pointsList"></div>
</div>

<div id="stats">
  <div class="stat"><div class="stat-val">15 км</div><div class="stat-label">Маршрут</div></div>
  <div class="stat"><div class="stat-val">8</div><div class="stat-label">Точек</div></div>
  <div class="stat"><div class="stat-val">~2 ч</div><div class="stat-label">Время</div></div>
  <div class="stat"><div class="stat-val">↑ 12 м</div><div class="stat-label">Перепад</div></div>
</div>

<button id="locateBtn" title="Моё местоположение">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v4"/><path d="M12 18v4"/>
    <path d="M2 12h4"/><path d="M18 12h4"/>
  </svg>
</button>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<script>
  const map = L.map('map', {
    zoomControl: false
  }).setView([54.625, 19.875], 13);

  L.control.zoom({ position: 'topleft' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · КосаВело'
  }).addTo(map);

  // ===== Данные =====
  const allPoints = [
    [54.635013, 19.883429],
    [54.637620, 19.878199],
    [54.646222, 19.866056],
    [54.625471, 19.882037],
    [54.612842, 19.878770],
    [54.605065, 19.855597],
    [54.614433, 19.864172], // 10 — промежуточная
    [54.612064, 19.860766],
    [54.622897, 19.871746],
    [54.630612, 19.876617],
    [54.633204, 19.886628]
  ];

  const names = [
    'Музей «Старый Люнет»',
    'Форт Западный',
    'Южный мол',
    'Ангары «Нойтиф»',
    'Взлётная полоса',
    'Ржавый город',
    'Дорога сквозь дюны',
    'Наш велопрокат'
  ];

  const descriptions = [
    'Атмосферный музей на Балтийской косе, созданный в бывшем фортификационном укреплении 19 века — люнете № 3, который был частью обороны крепости Пиллау. Здесь собраны подлинные артефакты от времён Пруссии до Второй мировой: оружие, документы, редкие карты, шифровальная машина «Энигма». Есть мини-кинозал и авторские экскурсии.',
    'Построен в 1869–1871 годах для защиты порта Пиллау от атак с моря. Входил в систему береговых укреплений на Балтийской косе. Оснащён казематами, капонирами и мощными валами, в конце XIX века усилен бетоном — на тот момент это был один из самых современных фортов Восточной Пруссии.',
    'Исторический волнорез на Балтийской косе, построенный в XVIII–XIX веках для защиты порта Пиллау от морской стихии. Сегодня — это более километра прогулки прямо в море, к зелёному маяку на горизонте.',
    'Построены в 1930-х как часть немецкой авиабазы Neutief. Использовались Люфтваффе, а после войны — советской морской авиацией. Сохранились массивные бетонные ангары и остатки взлётных полос.',
    'Построены в 1930-х годах как часть немецкой авиабазы Neutief. Сегодня сохранилась одна полоса — бетон потрескался, местами зарос травой, но до сих пор просматривается старая разметка.',
    'Арт-пространство на базе заброшенной военной зоны. Ежегодно летом проходит фестиваль Ржавый дракон — костюмированное шоу в стиле постапокалипсиса.',
    'Песчаные холмы высотой до 40 метров. Уникальный природный ландшафт: редкие растения, миграции птиц, панорамные виды.',
    'Тут ничего особенного, просто самый лучший велопрокат на Балтийской косе 🚲'
  ];

  const imageUrls = [
    'https://picsum.photos/seed/museum/320/200',
    'https://picsum.photos/seed/fortress/320/200',
    'https://picsum.photos/seed/pier/320/200',
    'https://picsum.photos/seed/hangar/320/200',
    'https://picsum.photos/seed/runway/320/200',
    'https://picsum.photos/seed/art/320/200',
    'https://picsum.photos/seed/dunes/320/200',
    'https://picsum.photos/seed/bikerental/320/200'
  ];

  // markerIndices: только именованные точки, без промежуточной (индекс 6)
  const markerIndices = [0, 1, 2, 3, 4, 7, 8, 10];
  const leafletMarkers = [];

  // ===== Маркеры =====
  markerIndices.forEach(function(i, idx) {
    const isRental = idx === 7;
    const icon = L.divIcon({
      className: 'numbered-icon' + (isRental ? ' rental-marker' : ''),
      html: (idx + 1).toString(),
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const popupContent = [
      '<div class="popup-card">',
        '<div class="popup-image">',
          '<img src="', imageUrls[idx], '" alt="', names[idx], '" loading="lazy" />',
          '<span class="image-badge">Точка ', (idx + 1), '</span>',
          '<div class="image-overlay"></div>',
        '</div>',
        '<div class="popup-header">',
          '<div class="popup-title">', names[idx], '</div>',
        '</div>',
        '<div class="popup-body">',
          '<div class="description-scroll">',
            '<p>', descriptions[idx], '</p>',
          '</div>',
        '</div>',
      '</div>'
    ].join('');

    const marker = L.marker(allPoints[i], { icon: icon })
      .addTo(map)
      .bindPopup(popupContent, { maxWidth: 300, className: 'custom-popup' });

    leafletMarkers.push(marker);
  });

  // ===== POI — точки интереса (без номера, знак ?) =====
  const poiPoints = [
    {
      coords: [54.600577, 19.843018],
      name: 'Береговая зенитная батарея «Лемберг»',
      image: 'https://picsum.photos/seed/lemberg/320/200',
      desc: 'Мощный немецкий фортификационный комплекс 1943 года постройки. Состояла из четырёх 105-мм зенитных орудий SK C/32, около 25 железобетонных сооружений: орудийные капониры, бункеры для боеприпасов, электростанция, столовая и бункер целеуказания. Взята советскими войсками весной 1945 года в ходе Восточно-Прусской операции. Сегодня основные конструкции хорошо сохранились и доступны для самостоятельного осмотра.'
    }
  ];

  poiPoints.forEach(function(poi) {
    const icon = L.divIcon({
      className: 'poi-icon',
      html: '?',
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    const popupContent = [
      '<div class="popup-card">',
        '<div class="popup-image">',
          '<img src="', poi.image, '" alt="', poi.name, '" loading="lazy" />',
          '<span class="image-badge" style="background:#7c3aed;color:#fff">Точка интереса</span>',
          '<div class="image-overlay"></div>',
        '</div>',
        '<div class="popup-header">',
          '<div class="popup-title">', poi.name, '</div>',
        '</div>',
        '<div class="popup-body">',
          '<div class="description-scroll">',
            '<p>', poi.desc, '</p>',
          '</div>',
        '</div>',
      '</div>'
    ].join('');

    L.marker(poi.coords, { icon: icon })
      .addTo(map)
      .bindPopup(popupContent, { maxWidth: 300, className: 'custom-popup' });
  });
  const routeStyle = [{ color: '#39d353', weight: 4, opacity: 0.85 }];

  // Участок 1: точки 0→1→2→3→4
  L.Routing.control({
    waypoints: [0,1,2,3,4].map(function(i){ return L.latLng(allPoints[i]); }),
    routeWhileDragging: false,
    createMarker: function(){ return null; },
    show: false,
    addWaypoints: false,
    fitSelectedRoutes: false,
    lineOptions: { styles: routeStyle, extendToWaypoints: false, missingRouteTolerance: 0 }
  }).addTo(map);

  // Участок 2: пунктир 4→5 (закрытая зона)
  L.polyline([allPoints[4], allPoints[5]], {
    color: '#39d353', weight: 4, dashArray: '8,6', opacity: 0.7
  }).addTo(map);

  // Участок 3: 5→10→6
  L.Routing.control({
    waypoints: [5,10,6].map(function(i){ return L.latLng(allPoints[i]); }),
    routeWhileDragging: false,
    createMarker: function(){ return null; },
    show: false,
    addWaypoints: false,
    fitSelectedRoutes: false,
    lineOptions: { styles: routeStyle, extendToWaypoints: false, missingRouteTolerance: 0 }
  }).addTo(map);

  // Участок 4: 6(дюны)→7→8→9
  L.Routing.control({
    waypoints: [7,8,9,10].map(function(i){ return L.latLng(allPoints[i]); }),
    routeWhileDragging: false,
    createMarker: function(){ return null; },
    show: false,
    addWaypoints: false,
    fitSelectedRoutes: false,
    lineOptions: { styles: routeStyle, extendToWaypoints: false, missingRouteTolerance: 0 }
  }).addTo(map);

  // ===== Боковая панель =====
  const list = document.getElementById('pointsList');
  markerIndices.forEach(function(pointIdx, idx) {
    const isRental = idx === 7;
    const item = document.createElement('div');
    item.className = 'point-item';
    item.innerHTML =
      '<div class="point-num' + (isRental ? ' rental' : '') + '">' + (idx + 1) + '</div>' +
      '<div class="point-info">' +
        '<div class="point-name">' + names[idx] + '</div>' +
        '<div class="point-type">' + (isRental ? 'Пункт проката' : 'Достопримечательность') + '</div>' +
      '</div>';
    item.addEventListener('click', function() {
      map.setView(allPoints[pointIdx], 16, { animate: true });
      setTimeout(function() { leafletMarkers[idx].openPopup(); }, 500);
    });
    list.appendChild(item);
  });


  // ===== Геолокация =====
  let userMarker = null;
  let locateActive = false;

  function startLocate() {
    const btn = document.getElementById('locateBtn');
    locateActive = true;
    btn.classList.add('active');
    localStorage.setItem('locateActive', 'true');
    map.locate({ watch: true, setView: true, maxZoom: 15 });
  }

  function stopLocate() {
    const btn = document.getElementById('locateBtn');
    locateActive = false;
    btn.classList.remove('active');
    localStorage.setItem('locateActive', 'false');
    map.stopLocate();
    if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  }

  document.getElementById('locateBtn').addEventListener('click', function() {
    if (!locateActive) { startLocate(); } else { stopLocate(); }
  });

  map.on('locationfound', function(e) {
    const el = document.createElement('div');
    el.className = 'user-location-marker';
    el.innerHTML = '<div class="pulse"></div>';
    const icon = L.divIcon({ className: '', html: el.outerHTML, iconSize: [16, 16], iconAnchor: [8, 8] });
    if (!userMarker) {
      userMarker = L.marker(e.latlng, { icon: icon }).addTo(map);
    } else {
      userMarker.setLatLng(e.latlng);
    }
  });

  map.on('locationerror', function() {
    stopLocate();
    alert('Не удалось определить местоположение. Разрешите доступ к геолокации.');
  });

  // Восстанавливаем состояние после обновления страницы
  if (localStorage.getItem('locateActive') === 'true') {
    startLocate();
  }
</script>
</body>
</html>
